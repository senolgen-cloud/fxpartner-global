name: Telegram content cron

on:
  schedule:
    # Market snapshot chart — every 2 hours
    - cron: "0 */2 * * *"
    # News scan is paused (workflow_dispatch only) until DEEPL_API_KEY and
    # UPSTASH_REDIS_REST_URL/TOKEN are configured — without them
    # /api/cron/news-update 500s on every call.
  workflow_dispatch:

jobs:
  market-update:
    if: github.event.schedule == '0 */2 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger market-update
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://fxpartner.global/api/cron/market-update

  news-update:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news-update
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://fxpartner.global/api/cron/news-update
